openapi: "3.0.3"
info:
  title: Load Test API
  description: Load testing API backend for comparing Cloud SQL / Spanner / BigQuery response characteristics
  version: "0.1.0"

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check endpoint
      tags: [health]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /users/{user_id}:
    get:
      operationId: getUserById
      summary: Get a user by ID (PK lookup)
      tags: [users]
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      summary: List users with limit
      tags: [users]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /users/search:
    get:
      operationId: searchUsers
      summary: Search users by name (partial match, no index)
      tags: [users]
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /users/stats:
    get:
      operationId: getUserStats
      summary: Get user statistics (COUNT, AVG)
      tags: [users]
      responses:
        "200":
          description: User statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

components:
  schemas:
    User:
      type: object
      required: [id, name, age, email]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        age:
          type: integer
        email:
          type: string
          format: email

    UserStats:
      type: object
      required: [count, avg_age]
      properties:
        count:
          type: integer
        avg_age:
          type: number
          format: float
          nullable: true

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: "ok"

    ValidationErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: array
          items:
            $ref: "#/components/schemas/ValidationError"

    ValidationError:
      type: object
      required: [loc, msg, type]
      properties:
        loc:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
        msg:
          type: string
        type:
          type: string

    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
